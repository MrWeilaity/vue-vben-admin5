server:
  port: 8080

spring:
  application:
    name: vben-service
  datasource:
    url: jdbc:postgresql://localhost:5432/vben_admin
    username: postgres
    password: 123456
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
  flyway:
    enabled: true
    baseline-on-migrate: true

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: AUTO
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

security:
  jwt:
    issuer: vben-service
    access-token-expire-seconds: 1800
    refresh-token-expire-seconds: 1209600
    secret: please-change-to-very-long-key-at-least-256-bits

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    display-request-duration: true
  scalar:
    path: /scalar

logging:
  level:
    root: INFO
